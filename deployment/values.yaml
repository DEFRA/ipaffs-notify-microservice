service: notify-service

container:
  replicas: 1

serviceBus:
  enabled: true

externalSecret:
  enabled: true
  refreshInterval: 1h
  secrets:
    - secretKey: TRADE_PLATFORM_CLIENT_SECRET
      remoteKey: tradePlatformClientSecret
    - secretKey: TRADE_PLATFORM_SUBSCRIPTION_KEY
      remoteKey: tradePlatformSubscriptionKey
    - secretKey: SERVICE_BUS_CONNECTION_STRING
      remoteKey: serviceBusConnectionString
